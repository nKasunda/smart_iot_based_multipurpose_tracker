<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TrackOS | Provisioning</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#9d4300",
                    "primary-container": "#f97316",
                    "on-surface": "#191c1e",
                    "on-surface-variant": "#584237",
                    "surface": "#f7f9fb",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#e0c0b1",
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
            }
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #9d4300 0%, #f97316 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen p-6">

<div class="w-full max-w-2xl">
    <!-- Header -->
    <div class="flex flex-col items-center mb-10">
        <div class="w-16 h-16 rounded-2xl bg-primary flex items-center justify-center mb-6 shadow-xl shadow-primary/20">
            <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">add_moderator</span>
        </div>
        <h1 class="font-manrope font-extrabold text-primary text-4xl tracking-tighter italic">Provisioning Terminal</h1>
        <p class="text-on-surface-variant font-medium mt-2">Initialize new technical asset in TrackOS registry</p>
    </div>

    <!-- Provisioning Card -->
    <div class="bg-white rounded-[2.5rem] p-12 shadow-2xl border border-white/20">
        <form id="provisionForm" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Left: Basic Info -->
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-extrabold text-on-surface-variant tracking-[0.2em] uppercase" for="name">Device Name</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">label</span>
                            <input class="w-full h-14 pl-12 bg-surface-container-lowest border border-outline-variant/60 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface placeholder:text-zinc-300" id="name" placeholder="e.g. TRK-DELTA-9" required/>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-extrabold text-on-surface-variant tracking-[0.2em] uppercase" for="imei">IMEI / Identifier</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">fingerprint</span>
                            <input class="w-full h-14 pl-12 bg-surface-container-lowest border border-outline-variant/60 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface" id="imei" required/>
                        </div>
                    </div>
                </div>

                <!-- Right: Technical Details -->
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-extrabold text-on-surface-variant tracking-[0.2em] uppercase" for="model">Model Variant</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">inventory_2</span>
                            <input class="w-full h-14 pl-12 bg-surface-container-lowest border border-outline-variant/60 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface" id="model" placeholder="Standard v2.1"/>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-extrabold text-on-surface-variant tracking-[0.2em] uppercase" for="sim">SIM Number</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">sim_card</span>
                            <input class="w-full h-14 pl-12 bg-surface-container-lowest border border-outline-variant/60 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface" id="sim"/>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Full Width: Assignment (The core request) -->
            <div class="space-y-2 pt-4 border-t border-zinc-100">
                <label class="text-[10px] font-extrabold text-on-surface-variant tracking-[0.2em] uppercase" for="userSub">Operator Assignment</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">person</span>
                    <select id="userSub" class="w-full h-14 pl-12 bg-surface-container-lowest border border-outline-variant/60 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-on-surface outline-none italic font-bold text-xs" required>
                        <option value="">Querying Operator Registry...</option>
                    </select>
                </div>
                <p class="text-[9px] text-zinc-400 mt-1 ml-2">Every technical asset must be linked to an authorized operator.</p>
            </div>

            <div class="flex gap-4 pt-6">
                <button type="button" onclick="window.history.back()" class="flex-1 h-14 border-2 border-zinc-100 text-zinc-400 font-bold rounded-xl hover:bg-zinc-50 transition-all uppercase tracking-widest text-[10px]">Cancel</button>
                <button type="submit" class="flex-[2] h-14 signature-gradient text-white font-bold rounded-xl active:scale-[0.98] transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    <span>COMPLETE PROVISIONING</span>
                    <span class="material-symbols-outlined">save</span>
                </button>
            </div>
        </form>
    </div>

    <!-- Status -->
    <div class="mt-12 flex justify-between items-center px-4">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
            <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest italic">Registry Connection: Active</span>
        </div>
        <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tighter italic">V.4.2 Registry Service</span>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
    requireAuth();
    
    // Load users for the assignment dropdown
    async function loadOperators() {
        try {
            const users = await apiFetch('/users');
            const sel = document.getElementById('userSub');
            sel.innerHTML = '<option value="">Select Primary Operator...</option>';
            users.forEach(u => {
                sel.innerHTML += `<option value="${u.id}">${u.name} [${u.email}]</option>`;
            });
        } catch (err) {
            console.error(err);
            alert("Failed to load operator registry.");
        }
    }

    document.getElementById('provisionForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            name: document.getElementById('name').value,
            imei: document.getElementById('imei').value,
            model: document.getElementById('model').value,
            sim_number: document.getElementById('sim').value,
            user_id: document.getElementById('userSub').value
        };

        try {
            await apiFetch('/devices', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            window.location.href = '/devices.html';
        } catch (err) {
            alert(err.message);
        }
    };

    window.onload = loadOperators;
</script>
</body>
</html>
