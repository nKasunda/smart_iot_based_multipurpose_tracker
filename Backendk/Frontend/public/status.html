<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TrackOS - Diagnostics</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#9d4300",
                    "primary-container": "#f97316",
                    "on-surface": "#191c1e",
                    "on-surface-variant": "#584237",
                    "surface-container": "#eceef0",
                    "surface-container-high": "#e6e8ea",
                    "surface-container-lowest": "#ffffff",
                    "background": "#f7f9fb",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "tertiary": "#006e2f",
                    "tertiary-container": "#00b251",
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
            }
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-2xl flex justify-between items-center px-6 h-16 border-b border-surface-container-high">
    <div class="flex items-center gap-4">
        <h1 class="font-manrope font-extrabold text-primary text-xl tracking-tighter italic">TrackOS</h1>
    </div>
    <div id="user-avatar" class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold italic shadow-sm">U</div>
</header>

<!-- NavigationDrawer -->
<aside class="hidden md:flex h-screen w-72 fixed left-0 top-0 bg-slate-100 flex-col gap-1 p-6 pt-24 z-40 border-r border-surface-container-high">
    <nav class="space-y-1">
        <a class="flex items-center gap-4 text-zinc-600 px-4 py-3 hover:bg-white/60 hover:scale-[1.02] transition-all duration-300 rounded-xl" href="/">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-inter text-sm font-medium">Dashboard</span>
        </a>
        <a class="flex items-center gap-4 text-zinc-600 px-4 py-3 hover:bg-white/60 hover:scale-[1.02] transition-all duration-300 rounded-xl" href="/devices.html">
            <span class="material-symbols-outlined">sensors</span>
            <span class="font-inter text-sm font-medium">Devices</span>
        </a>
        <a class="flex items-center gap-4 text-zinc-600 px-4 py-3 hover:bg-white/60 hover:scale-[1.02] transition-all duration-300 rounded-xl" href="/alerts.html">
            <span class="material-symbols-outlined">notifications</span>
            <span class="font-inter text-sm font-medium">Alerts Monitoring</span>
        </a>
    </nav>
</aside>

<main class="md:ml-72 pt-24 px-6 pb-12 min-h-screen">
    <section class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <span class="text-[10px] font-extrabold uppercase tracking-[0.3em] text-primary/70 mb-2 block italic">Diagnostic Protocol</span>
            <h2 class="font-headline text-4xl font-extrabold text-on-surface tracking-tighter italic">Device Health Monitor</h2>
        </div>
        <div class="flex items-center gap-3">
             <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Select Device:</span>
             <select id="deviceSelect" class="h-12 bg-white border border-surface-container-high rounded-xl px-4 text-xs font-bold outline-none focus:ring-2 focus:ring-primary/20" onchange="loadDeviceStatus()">
               <option value="">Select a device...</option>
             </select>
        </div>
    </section>

    <!-- Health Hero -->
    <div id="statusHero" class="bg-surface-container-lowest rounded-[2.5rem] border border-surface-container-high p-12 transition-all duration-700 flex flex-col items-center text-center">
        <div id="statusIndicator" class="w-48 h-48 rounded-full bg-zinc-100 flex items-center justify-center mb-8 relative">
            <div id="pulseBg" class="absolute inset-[-20px] rounded-full bg-primary/5 blur-3xl opacity-0 transition-opacity duration-1000"></div>
            <span class="material-symbols-outlined text-6xl text-zinc-300">hub</span>
        </div>
        
        <div id="assetLabel" class="text-[10px] font-extrabold uppercase tracking-[0.3em] text-zinc-300 mb-2 italic">Awaiting Device selection</div>
        <h2 id="statusText" class="font-headline text-5xl font-extrabold tracking-tighter text-on-surface italic mb-4">Offline</h2>
        <p id="lastSeen" class="text-sm font-medium text-on-surface-variant max-w-md">Please select a device to monitor health telemetry.</p>

        <!-- Metric Grid (Initially Hidden) -->
        <div id="statusMeta" class="grid grid-cols-1 md:grid-cols-3 gap-12 w-full max-w-4xl mt-12 pt-12 border-t border-surface-container opacity-0 transition-opacity duration-1000">
             <div class="space-y-2">
                <p class="text-[9px] font-extrabold uppercase tracking-widest text-zinc-400">Signal Strength</p>
                <div id="metaSignal" class="text-2xl font-manrope font-extrabold italic text-primary">--</div>
             </div>
             <div class="space-y-2">
                <p class="text-[9px] font-extrabold uppercase tracking-widest text-zinc-400">Battery Level</p>
                <div id="metaBattery" class="text-2xl font-manrope font-extrabold italic text-primary">--</div>
             </div>

        </div>
    </div>
</main>

<script src="/js/app.js"></script>
<script>
    requireAuth();
    
    async function populateDevices() {
        try {
            const devices = await apiFetch('/devices');
            const select = document.getElementById('deviceSelect');
            devices.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.id;
                opt.innerText = d.name;
                select.appendChild(opt);
            });
            
            // Auto load if ID in URL
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) {
                select.value = id;
                loadDeviceStatus();
            } else if (devices.length > 0) {
                select.value = devices[0].id;
                loadDeviceStatus();
            }
        } catch (err) { console.error(err); }
    }

    async function loadDeviceStatus() {
        const id = document.getElementById('deviceSelect').value;
        const hero = document.getElementById('statusHero');
        const indicator = document.getElementById('statusIndicator');
        const pulse = document.getElementById('pulseBg');
        const meta = document.getElementById('statusMeta');
        const assetLabel = document.getElementById('assetLabel');
        const statusText = document.getElementById('statusText');

        if (!id) {
            statusText.innerText = "Offline";
            statusText.classList.remove('text-primary', 'text-error');
            indicator.innerHTML = '<span class="material-symbols-outlined text-6xl text-zinc-300">hub</span>';
            indicator.className = "w-48 h-48 rounded-full bg-zinc-100 flex items-center justify-center mb-8 relative";
            pulse.classList.add('opacity-0');
            meta.classList.add('opacity-0');
            return;
        }

        try {
            const data = await apiFetch(`/devices/status/${id}`);
            
            pulse.classList.remove('opacity-0');
            meta.classList.remove('opacity-0');
            assetLabel.innerText = "Live Device Telemetry";
            assetLabel.classList.remove('text-zinc-300');
            assetLabel.classList.add('text-primary');

            if (data.status === 'online') {
                indicator.className = "w-48 h-48 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center mb-8 relative shadow-2xl shadow-primary/40";
                indicator.innerHTML = '<span class="material-symbols-outlined text-6xl text-white">bolt</span>';
                statusText.innerText = 'ONLINE';
                statusText.className = "font-headline text-5xl font-extrabold tracking-tighter text-primary italic mb-4";
                document.getElementById('lastSeen').innerText = 'Device is online and transmitting data normally.';
                
                // Fetch real telemetry
                try {
                    const latest = await apiFetch(`/location/latest/${id}`);
                    document.getElementById('metaSignal').innerText = latest.gsm_signal ? (latest.gsm_signal + "/31") : "N/A";
                    document.getElementById('metaBattery').innerText = latest.battery_level ? (latest.battery_level + "%") : "N/A";
                } catch (e) {
                    document.getElementById('metaSignal').innerText = "NO DATA";
                    document.getElementById('metaBattery').innerText = "NO DATA";
                }
            } else {
                indicator.className = "w-48 h-48 rounded-full bg-error flex items-center justify-center mb-8 relative shadow-2xl shadow-error/40";
                indicator.innerHTML = '<span class="material-symbols-outlined text-6xl text-white">signal_disconnected</span>';
                statusText.innerText = 'OFFLINE';
                statusText.className = "font-headline text-5xl font-extrabold tracking-tighter text-error italic mb-4";
                document.getElementById('lastSeen').innerText = `Device connection was lost.`;
                
                document.getElementById('metaSignal').innerText = "NULL";
                document.getElementById('metaBattery').innerText = "UNKNOWN";
            }
        } catch (err) {
            console.error(err);
            statusText.innerText = "LINK ERROR";
            statusText.classList.add('text-error');
        }
    }

    window.onload = () => {
        populateDevices();
        const u = getUser();
        if(u) document.getElementById('user-avatar').innerText = u.name.charAt(0).toUpperCase();
    };
</script>
</body>
</html>
