<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TrackOS - Alerts</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#9d4300",
                    "primary-container": "#f97316",
                    "on-surface": "#191c1e",
                    "on-surface-variant": "#584237",
                    "surface-container": "#eceef0",
                    "surface-container-high": "#e6e8ea",
                    "surface-container-lowest": "#ffffff",
                    "background": "#f7f9fb",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "tertiary": "#006e2f",
                    "tertiary-container": "#00b251",
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
            }
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-2xl flex justify-between items-center px-6 h-16 border-b border-surface-container-high">
    <div class="flex items-center gap-4">
        <h1 class="font-manrope font-extrabold text-primary text-xl tracking-tighter italic">TrackOS</h1>
    </div>
    <div id="user-avatar" class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold italic shadow-sm">U</div>
</header>

<!-- NavigationDrawer -->
<aside class="hidden md:flex h-screen w-72 fixed left-0 top-0 bg-slate-100 flex-col gap-1 p-6 pt-24 z-40 border-r border-surface-container-high">
    <nav class="space-y-1">
        <a class="flex items-center gap-4 text-zinc-600 px-4 py-3 hover:bg-white/60 hover:scale-[1.02] transition-all duration-300 rounded-xl" href="/">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-inter text-sm font-medium">Dashboard</span>
        </a>
        <a class="flex items-center gap-4 text-zinc-600 px-4 py-3 hover:bg-white/60 hover:scale-[1.02] transition-all duration-300 rounded-xl" href="/devices.html">
            <span class="material-symbols-outlined">sensors</span>
            <span class="font-inter text-sm font-medium">Devices</span>
        </a>
        <a class="flex items-center gap-4 bg-white text-primary font-bold rounded-xl px-4 py-3 shadow-md hover:scale-[1.02] transition-all duration-300" href="/alerts.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">notifications</span>
            <span class="font-inter text-sm font-semibold">Alerts Monitoring</span>
        </a>
    </nav>
</aside>

<main class="md:ml-72 pt-24 px-6 pb-12 min-h-screen">
    <section class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <span id="alerts-context" class="text-[10px] font-extrabold uppercase tracking-[0.3em] text-primary/70 mb-2 block italic">System Integrity</span>
            <h2 id="alerts-title" class="font-headline text-4xl font-extrabold text-on-surface tracking-tighter italic">Alerts Feed</h2>
            <p class="text-xs text-on-surface-variant font-medium mt-2 italic shadow-zinc-100 italic">Technical audit log of device events.</p>
        </div>
        <div class="flex gap-2 bg-surface-container border border-surface-container-high p-1.5 rounded-2xl">
            <button onclick="filterAlerts('all')" id="tab-all" class="text-[9px] font-extrabold uppercase tracking-widest px-4 py-2 rounded-xl bg-white text-primary shadow-sm transition-all">All Alerts</button>
            <button onclick="filterAlerts('pending')" id="tab-pending" class="text-[9px] font-extrabold uppercase tracking-widest px-4 py-2 rounded-xl text-zinc-500 hover:text-primary transition-all">Pending</button>
            <button onclick="filterAlerts('acknowledged')" id="tab-acknowledged" class="text-[9px] font-extrabold uppercase tracking-widest px-4 py-2 rounded-xl text-zinc-500 hover:text-primary transition-all">Acknowledged</button>
        </div>
    </section>

    <!-- Alerts Table -->
    <div class="bg-surface-container-lowest rounded-[2.5rem] border border-surface-container-high shadow-xl overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-surface-container/30 border-b border-surface-container-high">
                    <th class="p-6 text-[10px] font-extrabold uppercase tracking-[0.15em] text-zinc-400 italic">Timestamp</th>
                    <th class="p-6 text-[10px] font-extrabold uppercase tracking-[0.15em] text-zinc-400 italic">Device</th>
                    <th class="p-6 text-[10px] font-extrabold uppercase tracking-[0.15em] text-zinc-400 italic">Alert Type</th>
                    <th class="p-6 text-[10px] font-extrabold uppercase tracking-[0.15em] text-zinc-400 italic">Status</th>
                    <th class="p-6 text-[10px] font-extrabold uppercase tracking-[0.15em] text-zinc-400 italic text-right italic">Action</th>
                </tr>
            </thead>
            <tbody id="alerts-table-body" class="divide-y divide-surface-container">
                <!-- Data rows injected here -->
            </tbody>
        </table>
    </div>
</main>

<script src="/js/app.js"></script>
<script>
    requireAuth();
    let allAlerts = [];
    let currentFilter = 'all';

    async function loadAlerts() {
        try {
            allAlerts = await apiFetch('/alerts');
            const user = getUser();
            if(user) {
                document.getElementById('user-avatar').innerText = user.name.charAt(0).toUpperCase();
                
                // Role-based Context
                const ctx = document.getElementById('alerts-context');
                const title = document.getElementById('alerts-title');
                if (user.role === 'admin') {
                    ctx.innerText = 'Global System Integrity';
                    title.innerText = 'System Audit Log';
                } else {
                    ctx.innerText = 'Security Monitoring';
                    title.innerText = 'My Alerts';
                }
            }
            renderTable();
        } catch (err) { console.error(err); }
    }

    function filterAlerts(type) {
        currentFilter = type;
        document.querySelectorAll('[id^="tab-"]').forEach(t => {
            t.classList.remove('bg-white', 'text-primary', 'shadow-sm');
            t.classList.add('text-zinc-500');
        });
        const active = document.getElementById(`tab-${type}`);
        active.classList.add('bg-white', 'text-primary', 'shadow-sm');
        active.classList.remove('text-zinc-500');
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('alerts-table-body');
        tbody.innerHTML = '';

        const filtered = allAlerts.filter(a => {
            if(currentFilter === 'pending') return a.status !== 'acknowledged';
            if(currentFilter === 'acknowledged') return a.status === 'acknowledged';
            return true;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="p-20 text-center italic text-xs text-zinc-400">No alerts found in the system.</td></tr>';
            return;
        }

        filtered.forEach(a => {
            const isDanger = a.type.includes('low') || a.type.includes('error');
            const date = new Date(a.triggered_at);
            tbody.innerHTML += `
                <tr class="hover:bg-zinc-50/50 transition-colors">
                    <td class="p-6">
                        <div class="text-xs font-bold text-on-surface tracking-tighter">${date.toLocaleTimeString()}</div>
                        <div class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest">${date.toLocaleDateString()}</div>
                    </td>
                    <td class="p-6">
                        <div class="text-xs font-extrabold text-primary italic uppercase tracking-tight">${a.device_name || 'Device'}</div>
                    </td>
                    <td class="p-6">
                        <span class="flex items-center gap-1.5 px-3 py-1 ${isDanger ? 'bg-error-container/20 text-error' : 'bg-primary/10 text-primary'} text-[9px] font-bold rounded-full uppercase tracking-widest italic shadow-sm w-fit">
                            <span class="material-symbols-outlined text-xs">${isDanger ? 'warning' : 'info'}</span>
                            ${a.type.replace('_', ' ')}
                        </span>
                    </td>
                    <td class="p-6">
                         <span class="text-[10px] font-extrabold uppercase tracking-widest ${a.status === 'acknowledged' ? 'text-zinc-400' : 'text-primary animate-pulse'} italic">
                            ${a.status}
                        </span>
                    </td>
                    <td class="p-6 text-right">
                        ${a.status !== 'acknowledged' ? `
                            <button onclick="acknowledge(${a.id})" class="h-10 px-6 bg-primary text-white text-[9px] font-bold uppercase tracking-widest rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-all">Acknowledge &rarr;</button>
                        ` : `
                            <div class="flex items-center justify-end gap-2 text-zinc-300">
                                <span class="text-[9px] font-bold italic">ACKNOWLEDGED</span>
                                <span class="material-symbols-outlined text-sm">verified</span>
                            </div>
                        `}
                    </td>
                </tr>
            `;
        });
    }

    async function acknowledge(id) {
        try {
            await apiFetch(`/alerts/${id}/acknowledge`, { method: 'PUT' });
            loadAlerts();
        } catch (err) { alert(err.message); }
    }

    window.onload = loadAlerts;
</script>
</body>
</html>
