<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TrackOS - Devices</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#9d4300",
                    "primary-container": "#f97316",
                    "on-surface": "#191c1e",
                    "on-surface-variant": "#584237",
                    "surface-container": "#eceef0",
                    "surface-container-high": "#e6e8ea",
                    "surface-container-lowest": "#ffffff",
                    "background": "#f7f9fb",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "tertiary": "#006e2f",
                    "tertiary-container": "#00b251",
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
            }
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-2xl flex justify-between items-center px-6 h-16 border-b border-surface-container-high">
    <div class="flex items-center gap-4">
        <h1 class="font-manrope font-extrabold text-primary text-xl tracking-tighter italic">TrackOS</h1>
    </div>
    <div class="flex items-center gap-4 pl-6 border-l border-surface-container-high">
         <div id="user-avatar" class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold italic">U</div>
    </div>
</header>

<!-- NavigationDrawer -->
<aside class="hidden md:flex h-screen w-72 fixed left-0 top-0 bg-slate-100 flex-col gap-1 p-6 pt-24 z-40 border-r border-surface-container-high">
    <nav class="space-y-1">
        <a class="flex items-center gap-4 text-zinc-600 px-4 py-3 hover:bg-white/60 hover:scale-[1.02] transition-all duration-300 rounded-xl" href="/">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-inter text-sm font-medium">Dashboard</span>
        </a>
        <a class="flex items-center gap-4 bg-white text-primary font-bold rounded-xl px-4 py-3 shadow-md hover:scale-[1.02] transition-all duration-300" href="/devices.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">sensors</span>
            <span class="font-inter text-sm font-semibold">Devices</span>
        </a>
        <a class="flex items-center gap-4 text-zinc-600 px-4 py-3 hover:bg-white/60 hover:scale-[1.02] transition-all duration-300 rounded-xl" href="/alerts.html">
            <span class="material-symbols-outlined">notifications</span>
            <span class="font-inter text-sm font-medium">Alerts</span>
        </a>
    </nav>
</aside>

<main class="md:ml-72 pt-24 px-6 pb-12 min-h-screen">
    <section class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <span id="devices-context" class="text-[10px] font-extrabold uppercase tracking-[0.3em] text-primary/70 mb-2 block italic">Device Registry</span>
            <h2 id="devices-title" class="font-headline text-4xl font-extrabold text-on-surface tracking-tighter italic">Devices</h2>
            <p id="devices-subtitle" class="text-xs text-on-surface-variant font-medium mt-2 italic">Synchronizing registry with backend routes...</p>
        </div>
        <div class="flex gap-3">
            <button onclick="window.location.href='/add-device.html'" class="admin-only px-6 py-2.5 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold text-xs uppercase tracking-widest shadow-lg shadow-primary/20" style="display:none;">+ Add Device</button>
        </div>
    </section>

    <div class="flex gap-6 mb-8 border-b border-surface-container-high pb-4 overflow-x-auto">
        <button onclick="filterDevices('all')" id="tab-all" class="text-xs font-extrabold uppercase tracking-widest px-4 py-2 rounded-lg bg-primary text-white transition-all shadow-sm shadow-primary/20">All Devices</button>
        <button onclick="filterDevices('online')" id="tab-online" class="text-xs font-extrabold uppercase tracking-widest px-4 py-2 rounded-lg text-zinc-500 hover:bg-zinc-100 transition-all">Online</button>
        <button onclick="filterDevices('offline')" id="tab-offline" class="text-xs font-extrabold uppercase tracking-widest px-4 py-2 rounded-lg text-zinc-500 hover:bg-zinc-100 transition-all">Offline</button>
    </div>

    <div id="devices-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Devices Grid -->
    </div>
</main>



<!-- EDIT MODAL -->
<div id="editDeviceModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
    <div class="absolute inset-0 bg-on-background/10 backdrop-blur-xl" onclick="closeEditDeviceModal()"></div>
    <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-lg relative shadow-2xl border border-white/20">
        <h3 class="font-manrope font-extrabold text-2xl italic mb-6">Update Device Settings</h3>
        <form id="editDeviceForm" class="space-y-4">
            <input type="hidden" id="editId">
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest ml-4">Name</label>
                <input type="text" id="editName" class="w-full h-14 bg-surface-container-lowest border border-surface-container-high rounded-2xl px-6 outline-none" required>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest ml-4">Model</label>
                <input type="text" id="editModel" class="w-full h-14 bg-surface-container-lowest border border-surface-container-high rounded-2xl px-6 outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest ml-4">SIM Number</label>
                <input type="text" id="editSim" class="w-full h-14 bg-surface-container-lowest border border-surface-container-high rounded-2xl px-6 outline-none">
            </div>
            <div class="flex items-center gap-3 py-2 px-4 bg-zinc-50 rounded-2xl border border-zinc-100">
                <input type="checkbox" id="editActive" class="w-5 h-5 accent-primary">
                <label for="editActive" class="text-xs font-bold text-on-surface uppercase">Device Active</label>
            </div>
            <div class="flex gap-3 pt-4">
                <button type="button" onclick="deleteDevice()" class="flex-1 h-14 border-2 border-error/20 text-error rounded-2xl font-bold uppercase text-[10px] tracking-widest hover:bg-error/5 transition-all">Remove Device</button>
                <button type="submit" class="flex-1 h-14 bg-primary text-white rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-lg shadow-primary/20">Update Settings</button>
            </div>
        </form>
    </div>
</div>

<!-- SHARE MODAL -->
<div id="shareDeviceModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
    <div class="absolute inset-0 bg-on-background/10 backdrop-blur-xl" onclick="closeShareDeviceModal()"></div>
    <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-lg relative shadow-2xl border border-white/20 flex flex-col max-h-[90vh]">
        <h3 class="font-manrope font-extrabold text-2xl italic mb-2">Manage Access</h3>
        <p class="text-xs text-on-surface-variant font-medium mb-8">Authorize users to monitor this device.</p>
        
        <input type="hidden" id="shareDeviceId">
        
        <div class="flex-1 overflow-y-auto mb-8 pr-2 space-y-4">
            <h4 class="text-[10px] font-extrabold uppercase tracking-widest text-zinc-400">Authorized Personnel</h4>
            <div id="deviceUsersList" class="space-y-2">
                <!-- User list -->
            </div>
        </div>

        <form id="shareForm" class="space-y-4 pt-6 border-t border-zinc-100">
            <select id="shareUserSelect" class="w-full h-12 bg-surface-container-lowest border border-surface-container-high rounded-2xl px-4 text-xs font-bold outline-none" required>
                <option value="">Grant new access...</option>
            </select>
            <button type="submit" class="w-full h-12 bg-primary text-white rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-lg shadow-primary/20">Add User Access</button>
        </form>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
    requireAuth();
    let allDevices = [];
    let currentFilter = 'all';

    async function loadDevices() {
        try {
            allDevices = await apiFetch('/devices');
            const user = getUser();
            if(user) {
                document.getElementById('user-avatar').innerText = user.name.charAt(0).toUpperCase();
                
                // Role-based Context
                const ctx = document.getElementById('devices-context');
                const title = document.getElementById('devices-title');
                if (user.role === 'admin') {
                    ctx.innerText = 'Global Infrastructure Registry';
                    title.innerText = 'Fleet Management';
                } else {
                    ctx.innerText = 'Authorized Assets';
                    title.innerText = 'My Trackers';
                }
            }
            applyRoleBasedUI();
            updateStats();
            renderGrid();
        } catch (err) { console.error(err); }
    }

    function updateStats() {
        const online = allDevices.filter(d => d.last_seen_at && (new Date() - new Date(d.last_seen_at)) / 1000 <= 120).length;
        document.getElementById('devices-subtitle').innerText = `${allDevices.length} technical assets managed in current partition.`;
        document.getElementById('tab-all').innerText = `All Devices (${allDevices.length})`;
        document.getElementById('tab-online').innerText = `Online (${online})`;
        document.getElementById('tab-offline').innerText = `Offline (${allDevices.length - online})`;
    }

    function renderGrid() {
        const grid = document.getElementById('devices-grid');
        grid.innerHTML = '';
        const filtered = allDevices.filter(d => {
            if(currentFilter === 'online') return d.last_seen_at && (new Date() - new Date(d.last_seen_at)) / 1000 <= 120;
            if(currentFilter === 'offline') return !d.last_seen_at || (new Date() - new Date(d.last_seen_at)) / 1000 > 120;
            return true;
        });

        filtered.forEach(d => {
            const isOnline = d.last_seen_at && (new Date() - new Date(d.last_seen_at)) / 1000 <= 120;
            grid.innerHTML += `
                <div class="bg-surface-container-lowest p-8 rounded-[2.5rem] border border-surface-container hover:shadow-2xl transition-all duration-500 flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[10px] font-extrabold uppercase tracking-widest text-primary/60 italic">${d.imei}</span>
                            <span class="flex items-center gap-1.5 px-3 py-1 ${isOnline ? 'bg-tertiary-container/10 text-tertiary' : 'bg-zinc-100 text-zinc-400'} text-[10px] font-bold rounded-full uppercase tracking-tighter">
                                <div class="w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-tertiary shadow-[0_0_8px_#00b251]' : 'bg-zinc-300'}"></div>
                                ${isOnline ? 'Active' : 'Offline'}
                            </span>
                        </div>
                        <h3 class="font-manrope font-extrabold text-2xl tracking-tighter italic mb-4">${d.name}</h3>
                        <p class="text-[9px] font-bold text-zinc-300 uppercase tracking-[0.2em] mb-8">${d.model || 'TRACKOS UNIT'}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.location.href='/status.html?id=${d.id}'" class="flex-1 h-12 bg-zinc-100 font-bold text-[10px] uppercase tracking-widest rounded-2xl hover:bg-zinc-200 transition-all">Telemetry</button>
                        <button onclick="openEditModal(${d.id})" class="admin-only h-12 px-4 bg-primary/10 text-primary rounded-2xl hover:bg-primary hover:text-white transition-all"><span class="material-symbols-outlined text-sm">edit</span></button>
                        <button onclick="openShareModal(${d.id})" class="admin-only h-12 px-4 bg-tertiary/10 text-tertiary rounded-2xl hover:bg-tertiary hover:text-white transition-all"><span class="material-symbols-outlined text-sm">share</span></button>
                    </div>
                </div>
            `;
        });
        applyRoleBasedUI();
    }

    function filterDevices(type) {
        currentFilter = type;
        document.querySelectorAll('[id^="tab-"]').forEach(t => { t.classList.remove('bg-primary', 'text-white'); t.classList.add('text-zinc-500'); });
        const active = document.getElementById(`tab-${type}`);
        active.classList.add('bg-primary', 'text-white');
        active.classList.remove('text-zinc-500');
        renderGrid();
    }



    function openEditModal(id) {
        const d = allDevices.find(x => x.id === id);
        if(!d) return;
        document.getElementById('editId').value = d.id;
        document.getElementById('editName').value = d.name;
        document.getElementById('editModel').value = d.model || '';
        document.getElementById('editSim').value = d.sim_number || '';
        document.getElementById('editActive').checked = !!d.is_active;
        document.getElementById('editDeviceModal').classList.remove('hidden');
    }
    function closeEditDeviceModal() { document.getElementById('editDeviceModal').classList.add('hidden'); }

    document.getElementById('editDeviceForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        try {
            await apiFetch(`/devices/${id}`, {
                method: 'PUT',
                body: JSON.stringify({
                    name: document.getElementById('editName').value,
                    model: document.getElementById('editModel').value,
                    sim_number: document.getElementById('editSim').value,
                    is_active: document.getElementById('editActive').checked
                })
            });
            closeEditDeviceModal();
            loadDevices();
        } catch (err) { alert(err.message); }
    };

    async function deleteDevice() {
        if(!confirm('This will permanently sever all technical links for this device. Proceed?')) return;
        const id = document.getElementById('editId').value;
        try {
            await apiFetch(`/devices/${id}`, { method: 'DELETE' });
            closeEditDeviceModal();
            loadDevices();
        } catch (err) { alert(err.message); }
    }

    async function openShareModal(id) {
        document.getElementById('shareDeviceId').value = id;
        document.getElementById('shareDeviceModal').classList.remove('hidden');
        loadDeviceUsers(id);
        
        // Populate user select for sharing
        const users = await apiFetch('/users');
        const sel = document.getElementById('shareUserSelect');
        sel.innerHTML = '<option value="">Grant new access...</option>';
        users.forEach(u => sel.innerHTML += `<option value="${u.id}">${u.name}</option>`);
    }
    
    async function loadDeviceUsers(id) {
        const users = await apiFetch(`/devices/${id}/users`);
        const list = document.getElementById('deviceUsersList');
        list.innerHTML = '';
        if(users.length === 0) list.innerHTML = '<p class="p-6 text-center text-xs italic text-zinc-300">No external users assigned.</p>';
        users.forEach(u => {
            list.innerHTML += `
                <div class="flex justify-between items-center p-4 bg-zinc-50 rounded-2xl border border-zinc-100">
                    <div>
                        <p class="text-xs font-bold text-on-surface">${u.name}</p>
                        <p class="text-[10px] text-zinc-400 italic">${u.email}</p>
                    </div>
                    <button onclick="unassignUser(${id}, ${u.id})" class="text-error hover:bg-error/10 p-2 rounded-lg transition-all">
                        <span class="material-symbols-outlined text-sm">person_remove</span>
                    </button>
                </div>
            `;
        });
    }

    document.getElementById('shareForm').onsubmit = async (e) => {
        e.preventDefault();
        const deviceId = document.getElementById('shareDeviceId').value;
        const userId = document.getElementById('shareUserSelect').value;
        try {
            await apiFetch(`/devices/${deviceId}/share`, {
                method: 'POST',
                body: JSON.stringify({ user_id: userId })
            });
            loadDeviceUsers(deviceId);
        } catch (err) { alert(err.message); }
    };

    async function unassignUser(deviceId, userId) {
        if(!confirm('Revoke access for this operator?')) return;
        try {
            await apiFetch(`/devices/${deviceId}/unassign/${userId}`, { method: 'DELETE' });
            loadDeviceUsers(deviceId);
        } catch (err) { alert(err.message); }
    }

    function closeShareDeviceModal() { document.getElementById('shareDeviceModal').classList.add('hidden'); }

    window.onload = loadDevices;
</script>
</body>
</html>
